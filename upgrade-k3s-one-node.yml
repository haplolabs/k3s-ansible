---
- name: Upgrade exactly one k3s node
  hosts: k3s_cluster
  become: true
  gather_facts: false
  serial: 1
  environment: "{{ proxy_env | default({}) }}"
  pre_tasks:
    - name: Require --limit to select exactly one host
      ansible.builtin.assert:
        that:
          - ansible_play_hosts_all | length == 1
        fail_msg: >-
          This playbook must target exactly one host with --limit, for example:
          ansible-playbook -i inventory/haplolabs/hosts.yml upgrade-k3s-one-node.yml --limit k8s-srv-0

    - name: Gather facts for the selected node
      ansible.builtin.setup:

    - name: Determine k3s service name for this node
      ansible.builtin.set_fact:
        k3s_upgrade_service_name: >-
          {{ 'k3s' if inventory_hostname in groups[group_name_master | default('master')] else 'k3s-node' }}

    - name: Read current k3s version
      ansible.builtin.command: /usr/local/bin/k3s --version
      register: k3s_upgrade_version_before
      changed_when: false
      check_mode: false

    - name: Show current and target k3s versions
      ansible.builtin.debug:
        msg:
          - "current={{ k3s_upgrade_version_before.stdout_lines | first | default('unknown') }}"
          - "target={{ k3s_version }}"
          - "service={{ k3s_upgrade_service_name }}"

  tasks:
    - name: Download target k3s binary x64
      ansible.builtin.get_url:
        url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
        checksum: "sha256:https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-amd64.txt"
        dest: /usr/local/bin/k3s
        owner: root
        group: root
        mode: "0755"
      when: ansible_facts.architecture == "x86_64"
      notify: Restart k3s service

    - name: Download target k3s binary arm64
      ansible.builtin.get_url:
        url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s-arm64"
        checksum: "sha256:https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-arm64.txt"
        dest: /usr/local/bin/k3s
        owner: root
        group: root
        mode: "0755"
      when:
        - (ansible_facts.architecture is search("arm") and ansible_facts.userspace_bits == "64")
          or ansible_facts.architecture is search("aarch64")
      notify: Restart k3s service

    - name: Download target k3s binary armhf
      ansible.builtin.get_url:
        url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s-armhf"
        checksum: "sha256:https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-arm.txt"
        dest: /usr/local/bin/k3s
        owner: root
        group: root
        mode: "0755"
      when:
        - ansible_facts.architecture is search("arm")
        - ansible_facts.userspace_bits == "32"
      notify: Restart k3s service

    - name: Restart k3s service if binary changed
      ansible.builtin.meta: flush_handlers
      when: not ansible_check_mode

    - name: Read k3s version after upgrade
      ansible.builtin.command: /usr/local/bin/k3s --version
      register: k3s_upgrade_version_after
      changed_when: false
      check_mode: false

    - name: Verify target k3s version is installed
      ansible.builtin.assert:
        that:
          - k3s_version in k3s_upgrade_version_after.stdout
        fail_msg: >-
          Expected {{ k3s_version }}, got
          {{ k3s_upgrade_version_after.stdout_lines | first | default('unknown') }}
      when: not ansible_check_mode

    - name: Wait for k3s service to be active
      ansible.builtin.systemd:
        name: "{{ k3s_upgrade_service_name }}"
      register: k3s_upgrade_service_status
      until: k3s_upgrade_service_status.status.ActiveState == "active"
      retries: 30
      delay: 5

  handlers:
    - name: Restart k3s service
      ansible.builtin.systemd:
        name: "{{ k3s_upgrade_service_name }}"
        state: restarted
        daemon_reload: true
      when: not ansible_check_mode
